<header class="top-header">
	<div class="d-flex align-items-center">
		<i class="ti-menu mobile-toggle" id="mobile-toggle"></i>

			<i class="ti-search"></i>
			<input type="text" placeholder="Search students, faculty, or classes...">
		</div>
	</div>

	<div class="header-actions">
		<button class="icon-btn">
			<i class="ti-bell"></i>

				<span style="font-weight: 600; font-size: 14px; color: #333;">{{ session.get('full_name', 'Admin User') }}</span>
			</div>
		</div>
