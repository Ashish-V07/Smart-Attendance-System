<!DOCTYPE html>
<html lang="en">

<head>
	<!-- Meta -->
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<!-- The above 3 meta tags *must* come first in the head; any other head content must come *after* these tags -->
	<meta name="description"
		content="Smart Attendance System - Effortless, contactless, face recognition and real-time attendance tracking for schools, colleges, and corporate offices.">
	<meta name="keywords"
		content="smart attendance, face recognition attendance, RFID tracking, attendance system, biometric checkin, corporate HR tool, school attendance system">
	<!-- SITE TITLE -->
	<title>Forgot Password - Smart Attendance System</title>
	<!-- Latest Bootstrap min CSS -->
	<link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
	<!-- Google Font -->
	<link
		href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
		rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
		rel="stylesheet">
	<!-- Font Awesome CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<link rel="stylesheet" href="{{ url_for('static', filename='fonts/font-awesome.min.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='fonts/themify-icons.css') }}">
	<!--- owl carousel Css-->
	<link rel="stylesheet" href="{{ url_for('static', filename='owlcarousel/css/owl.carousel.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='owlcarousel/css/owl.theme.css') }}">
	<!--jquery-simple-mobilemenu Css-->
	<link rel="stylesheet" href="{{ url_for('static', filename='css/jquery-simple-mobilemenu.css') }}">
	<!-- MAGNIFIC CSS -->
	<link rel="stylesheet" href="{{ url_for('static', filename='css/magnific-popup.css') }}">
	<!-- animate CSS -->
	<link rel="stylesheet" href="{{ url_for('static', filename='css/animate.css') }}">
	<!-- Style CSS -->
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
	<!-- HTML5 shim and Respond.js IE8 support of HTML5 elements and media queries -->
	<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
	<!--[if lt IE 9]>
		  <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
		  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
		<![endif]-->
</head>

<body data-spy="scroll" data-offset="80">

	{% include "components/Error_Show.html" %}

	{% include "components/navbar.html" %}

	<!-- START SECTION TOP -->
	<section class="section-top">
		<div class="container">
			<div class="col-lg-10 offset-lg-1 text-center">
				<div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s"
					data-wow-offset="0">
					<h1>Forgot Password</h1>
					<ul>
						<li><a href="/">Home</a></li>
						<li> / Forgot Password</li>
					</ul>
				</div><!-- //.HERO-TEXT -->
			</div><!--- END COL -->
		</div><!--- END CONTAINER -->
	</section>
	<!-- END SECTION TOP -->

	<!-- FORGOT PASSWORD -->
	<div id="forgot-password-section" class="contact_area section-padding">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-6 col-sm-12 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s"
					data-wow-offset="0">
					<div class="contact"
						style="background: #f9f9f9; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
						<h3 class="text-center mb-4" style="margin-bottom: 30px; font-weight: 600;">Reset Your Password
						</h3>
						<p class="text-center" style="margin-bottom: 20px; color: #666;">Enter your email address and
							we'll send you an OTP to reset your password.</p>
						<form class="form" name="forgot_password" method="post" action="/forgot-password-check">
							<div class="row">
								<div class="form-group col-md-12">
									<label for="">Email Address</label>
									<input type="email" name="email" class="form-control" required="required"
										placeholder="Enter your email">
								</div>
								<div class="col-md-12 text-center" style="margin-top: 15px;">
									<button type="submit" value="Send OTP" name="submit" class="btn_one"
										style="width: 100%;" title="Send OTP">Send OTP</button>
								</div>
								<div class="col-md-12 text-center mt-3" style="margin-top: 15px;">
									<a href="login" style="color: #666; font-size: 14px;"><i class="ti-arrow-left"></i>
										Back to Sign In</a>
								</div>
							</div>
						</form>
					</div>
				</div><!-- END COL  -->
			</div><!-- END ROW -->
		</div><!--- END CONTAINER -->
	</div>
	<!-- END FORGOT PASSWORD -->

	{% include "components/footer.html" %}

	<!-- Latest jQuery -->
	<script src="{{ url_for('static', filename='js/jquery-1.12.4.min.js') }}"></script>
	<!-- Latest compiled and minified Bootstrap -->
	<script src="{{ url_for('static', filename='bootstrap/js/bootstrap.min.js') }}"></script>
	<!-- modernizer JS -->
	<script src="{{ url_for('static', filename='js/modernizr-2.8.3.min.js') }}"></script>
	<!-- jquery-simple-mobilemenu.min -->
	<script src="{{ url_for('static', filename='js/jquery-simple-mobilemenu.js') }}"></script>
	<!-- owl-carousel min js  -->
	<script src="{{ url_for('static', filename='owlcarousel/js/owl.carousel.min.js') }}"></script>
	<!-- magnific-popup js -->
	<script src="{{ url_for('static', filename='js/jquery.magnific-popup.min.js') }}"></script>
	<!-- countTo js -->
	<script src="{{ url_for('static', filename='js/jquery.inview.min.js') }}"></script>
	<!-- scrolltopcontrol js -->
	<script src="{{ url_for('static', filename='js/scrolltopcontrol.js') }}"></script>
	<!-- WOW - Reveal Animations When You Scroll -->
	<script src="{{ url_for('static', filename='js/wow.min.js') }}"></script>
	<!-- scripts js -->
	<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>

</body>

</html>
