<!DOCTYPE html>
<html lang="en">

<head>
	<!-- Meta -->
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<!-- SITE TITLE -->
	<title>Reset Password - Smart Attendance System</title>
	<!-- Latest Bootstrap min CSS -->
	<link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
	<!-- Google Font -->
	<link
		href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
		rel="stylesheet">
	<!-- Font Awesome CSS -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<link rel="stylesheet" href="{{ url_for('static', filename='fonts/font-awesome.min.css') }}">
	<link rel="stylesheet" href="{{ url_for('static', filename='fonts/themify-icons.css') }}">
	<!-- Style CSS -->
	<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body data-spy="scroll" data-offset="80">

	{% include "components/Error_Show.html" %}

	{% include "components/navbar.html" %}

	<!-- START SECTION TOP -->
	<section class="section-top">
		<div class="container">
			<div class="col-lg-10 offset-lg-1 text-center">
				<div class="section-top-title wow fadeInRight" data-wow-duration="1s" data-wow-delay="0.3s"
					data-wow-offset="0">
					<h1>Reset Password</h1>
					<ul>
						<li><a href="/">Home</a></li>
						<li> / Reset Password</li>
					</ul>
				</div>
			</div>
		</div>
	</section>
	<!-- END SECTION TOP -->

	<!-- RESET PASSWORD -->
	<div id="reset-password-section" class="contact_area section-padding">
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-6 col-sm-12 col-xs-12 wow fadeInUp" data-wow-duration="1s" data-wow-delay="0.2s"
					data-wow-offset="0">
					<div class="contact"
						style="background: #f9f9f9; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
						<h3 class="text-center mb-4" style="margin-bottom: 30px; font-weight: 600;">Set New Password
						</h3>
						<form class="form" name="reset_password" method="post" action="/reset_password_check"
							onsubmit="return validatePassword()">
							<div class="row">
								<div class="form-group col-md-12">
									<label for="">New Password</label>
									<input type="password" id="password" name="password" class="form-control"
										required="required" placeholder="Enter new password" minlength="6">
								</div>
								<div class="form-group col-md-12">
									<label for="">Confirm New Password</label>
									<input type="password" id="confirm_password" name="confirm_password"
										class="form-control" required="required" placeholder="Confirm your new password"
										minlength="6">
									<small id="password_error" class="text-danger" style="display:none;">Passwords do
										not match!</small>
								</div>
								<div class="col-md-12 text-center" style="margin-top: 15px;">
									<button type="submit" value="Reset Password" name="submit" class="btn_one"
										style="width: 100%;" title="Reset Password">Update Password</button>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- END RESET PASSWORD -->

	{% include "components/footer.html" %}

	<!-- Latest jQuery -->
	<script src="{{ url_for('static', filename='js/jquery-1.12.4.min.js') }}"></script>
	<!-- Latest compiled and minified Bootstrap -->
	<script src="{{ url_for('static', filename='bootstrap/js/bootstrap.min.js') }}"></script>
	<!-- scripts js -->
	<script src="{{ url_for('static', filename='js/scripts.js') }}"></script>

	<script>
		function validatePassword() {
			var p1 = document.getElementById("password").value;
			var p2 = document.getElementById("confirm_password").value;
			if (p1 !== p2) {
				document.getElementById("password_error").style.display = "block";
				return false;
			}
			document.getElementById("password_error").style.display = "none";
			return true;
		}
	</script>

</body>

</html>
